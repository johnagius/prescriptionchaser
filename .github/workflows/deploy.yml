name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - claude/compassionate-pasteur-rouc84
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Embed BC console scripts into the app
        run: python3 build/inject-scripts.py || echo "scripts already embedded; continuing"

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
