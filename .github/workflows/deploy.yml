name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - claude/compassionate-pasteur-rouc84
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Embed BC console scripts into the app
        run: python3 build/inject-scripts.py || echo "scripts already embedded; continuing"

      - name: Ensure KV namespace for email overrides and bind it
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          API="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces"
          TITLE="prescriptionchaser-overrides"
          list=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" "$API?per_page=100" || echo '{}')
          if ! echo "$list" | jq -e '.success' >/dev/null 2>&1; then
            echo "::warning::KV API not accessible (token may lack Workers KV permission). Deploying without cloud email overrides."
            exit 0
          fi
          id=$(echo "$list" | jq -r --arg t "$TITLE" '.result[] | select(.title==$t) | .id' | head -n1)
          if [ -z "$id" ] || [ "$id" = "null" ]; then
            create=$(curl -s -X POST -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
              --data "{\"title\":\"$TITLE\"}" "$API")
            id=$(echo "$create" | jq -r '.result.id')
          fi
          if [ -z "$id" ] || [ "$id" = "null" ]; then
            echo "::warning::Could not resolve KV namespace id. Deploying without cloud email overrides."
            exit 0
          fi
          printf '\n[[kv_namespaces]]\nbinding = "OVERRIDES"\nid = "%s"\n' "$id" >> wrangler.toml
          echo "Bound OVERRIDES KV namespace: $id"

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
